<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-labelledby="title desc" shape-rendering="crispEdges">
  <title id="title">Agentmesh cost view</title>
  <desc id="desc">A mockup of the real `/mesh-cost` terminal table output for the Agentmesh MCP stack. Values are placeholders; run /mesh-cost for live numbers.</desc>
  <rect width="1200" height="480" fill="#fff"/>
  <rect x="28" y="28" width="1144" height="424" fill="#fff" stroke="#111" stroke-width="8"/>

  <g fill="#111">
    <rect x="64" y="54" width="8" height="8"/>
    <rect x="80" y="54" width="8" height="8"/>
    <rect x="96" y="54" width="8" height="8"/>
    <rect x="64" y="70" width="8" height="8"/>
  </g>
  <text x="120" y="80" fill="#111" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="22" font-weight="700" letter-spacing="3">AGENTMESH / COST VIEW</text>
  <g transform="translate(928 52)">
    <rect width="188" height="42" fill="#111"/>
    <rect x="12" y="14" width="12" height="12" fill="#fff"/>
    <text x="36" y="27" fill="#fff" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700">LIVE MEASUREMENT</text>
  </g>

  <text x="64" y="140" fill="#777" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">This is a mockup of the real terminal table `/mesh-cost` prints. Values below are placeholders — run the command for live numbers.</text>

  <g transform="translate(64 170)" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="16" fill="#111">
    <text x="0" y="0">Server       Marginal AI Credits (vs. zero-MCP floor)</text>
    <text x="0" y="26">----------   ------------------------------------------</text>
    <text x="0" y="52">engram       --</text>
    <text x="0" y="78">ax           --</text>
    <text x="0" y="104">codegraph    --</text>
    <text x="0" y="130">serena       --</text>
    <text x="0" y="156">----------   ------------------------------------------</text>
    <text x="0" y="182">floor        --  (no MCP servers, custom instructions still load)</text>
    <text x="0" y="208">full stack   --  (all 4 servers active)</text>
    <text x="0" y="234">stack tax    --  credits over the floor</text>
  </g>

  <rect x="64" y="422" width="1052" height="34" fill="#ddd"/>
  <rect x="80" y="434" width="10" height="10" fill="#111"/>
  <text x="108" y="446" fill="#111" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14">/mesh-cost</text>
  <text x="250" y="446" fill="#555" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">RUN THE LIVE COPILOT CLI MEASUREMENT — SINGLE-SAMPLE, EXPECT RUN-TO-RUN VARIANCE.</text>
</svg>
