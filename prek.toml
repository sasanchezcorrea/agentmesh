[[repos]]
repo = "builtin"

[[repos.hooks]]
id = "check-added-large-files"
args = ["--maxkb=512"]

[[repos.hooks]]
id = "check-case-conflict"

[[repos.hooks]]
id = "check-json"

[[repos.hooks]]
id = "check-toml"

[[repos.hooks]]
id = "check-yaml"

[[repos.hooks]]
id = "end-of-file-fixer"

[[repos.hooks]]
id = "trailing-whitespace"
args = ["--markdown-linebreak-ext=md"]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "javascript-and-shell-syntax"
name = "javascript and shell syntax"
entry = "npm run check-syntax --silent"
language = "system"
pass_filenames = false
always_run = true

[[repos.hooks]]
id = "unit-tests"
name = "unit tests"
entry = "npm test --silent"
language = "system"
pass_filenames = false
always_run = true
stages = ["pre-push"]
