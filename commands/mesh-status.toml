description = "Show which orchestrated MCP servers (CodeGraph, AX, Engram, Serena) are actually connected right now"
prompt = "Check your currently available tools (not the manifest, not documentation — the live tool list for this exact session) and report a table with one row per server: CodeGraph (tools prefixed codegraph_), AX (tools prefixed ax_ or mem-adjacent evidence-graph tools), Engram (tools prefixed mem_), Serena (find_symbol, insert_after_symbol, rename_symbol, etc.). For each, print ✅ connected + tool count, or ❌ not connected. Also print RTK's status by checking whether a PreToolUse/ContextReduction hook is configured for this client (not a tool — a hook, so check hook config rather than the tool list), and agentmesh's current mode (lite/full/ultra/off) from its active mode state. One shot: report only, do not change mode, write flag files, or persist anything."
