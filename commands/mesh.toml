description = "Set the agentmesh stack level (lite/full/ultra/off) — one synchronized intensity for the whole tool stack"
prompt = "Set agentmesh to {{args}} mode: one synchronized level for the whole stack. Agentmesh drives the required Ponytail companion to the same level and sets RTK's compression; you keep discovery search-first (CodeGraph then Serena) and answers proportional. At ultra: maximum cost discipline — Ponytail ultra, RTK ultra-compact, reuse prior CodeGraph/Serena results instead of re-searching, terse and pragmatic output. Ponytail owns code minimalism; do not restate its ladder. `/mesh off` disables the orchestration layer for the session; it does not disable Ponytail."
